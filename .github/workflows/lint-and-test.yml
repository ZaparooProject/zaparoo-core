name: Lint and Test

on:
  pull_request:
  push:
    branches:
      - main
  workflow_call:

# Cancel in-progress runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  packages: read
  security-events: write

jobs:
  ci:
    name: CI
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{
            github.event_name == 'pull_request'
              && fromJSON('[{"os":"ubuntu","runner":"ubicloud-standard-4"}]')
              || fromJSON('[
                   {"os":"ubuntu","runner":"ubicloud-standard-4"},
                   {"os":"macos","runner":"macos-latest"},
                   {"os":"windows","runner":"windows-latest"}
                 ]')
          }}
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Configure Go paths for Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "D:\go-cache" | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\go-mod-cache" | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\go-tmp" | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "GOCACHE=D:\go-cache"
          Add-Content -Path $env:GITHUB_ENV -Value "GOMODCACHE=D:\go-mod-cache"
          Add-Content -Path $env:GITHUB_ENV -Value "GOTMPDIR=D:\go-tmp"

      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: pkgconf
          path-type: inherit

      - name: Restore Go cache (Unix)
        if: matrix.os != 'windows'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: no-match-${{ runner.os }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-
            ${{ runner.os }}-go-

      - name: Restore Go cache (Windows)
        if: matrix.os == 'windows'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            D:\go-mod-cache
            D:\go-cache
          key: no-match-${{ runner.os }}
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-
            ${{ runner.os }}-go-

      - name: Download Go modules (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: go mod download

      - name: Download Go modules (non-Windows)
        if: matrix.os != 'windows'
        run: go mod download

      - name: Cache APT packages (Ubuntu)
        if: matrix.os == 'ubuntu'
        uses: awalsh128/cache-apt-pkgs-action@acb598e5ddbc6f68a970c5da0688d2f3a9f04d05 # v1.6.0
        with:
          packages: libnfc-dev libgtk-3-dev libx11-dev libpcsclite-dev libasound2-dev
          version: 1.1

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install libusb pkg-config

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: latest
          args: --timeout=5m

      - name: Install govulncheck
        if: matrix.os == 'ubuntu'
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (SARIF)
        if: matrix.os == 'ubuntu'
        run: govulncheck -format sarif -o govulncheck.sarif ./...
        continue-on-error: true

      - name: Run govulncheck (CI gate)
        if: matrix.os == 'ubuntu'
        run: govulncheck ./...

      - name: Upload govulncheck SARIF
        if: matrix.os == 'ubuntu' && !cancelled() && github.event_name != 'workflow_call' && hashFiles('govulncheck.sarif') != ''
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: govulncheck.sarif
          category: govulncheck

      - name: Run full tests (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          GOMAXPROCS: 2
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Run full tests (Unix)
        if: matrix.os != 'windows'
        run: go test -v -race -coverprofile=coverage.txt -covermode=atomic ./...

      - name: Upload rapid failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rapid-failures-${{ matrix.os }}
          path: '**/testdata/rapid/**/*.fail'
          if-no-files-found: ignore

      - name: Run deadlock detection tests
        if: matrix.os == 'ubuntu'
        run: go test -tags=deadlock -race -count=1 ./...

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu' && !startsWith(github.ref, 'refs/tags/')
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./coverage.txt
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

      - name: Save Go cache (Unix)
        if: matrix.os != 'windows'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-${{ github.run_id }}

      - name: Save Go cache (Windows)
        if: matrix.os == 'windows'
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            D:\go-mod-cache
            D:\go-cache
          key: ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-${{ github.run_id }}

  cross-lint:
    name: Cross Lint
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        target: [windows, darwin]
        runner: [ubicloud-standard-4]

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set image reference
        run: |
          OWNER_LC="${OWNER,,}"
          VERSION=$(cat scripts/zigcc/VERSION)
          echo "ZIGCC_IMAGE=ghcr.io/${OWNER_LC}/zigcc:${VERSION}" >> "$GITHUB_ENV"
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set cross-compilation environment
        run: |
          if [ "${{ matrix.target }}" = "windows" ]; then
            {
              echo "TARGET_CC=zig cc -w --target=x86_64-windows-gnu"
              echo "TARGET_CXX=zig c++ -w --target=x86_64-windows-gnu"
              echo "TARGET_CGO_CFLAGS="
              echo "TARGET_CGO_LDFLAGS=-Wl,--subsystem,windows"
            } >> "$GITHUB_ENV"
          elif [ "${{ matrix.target }}" = "darwin" ]; then
            {
              echo "TARGET_CC=zig cc -w --target=x86_64-macos -I/opt/macosx-sdk/usr/include -L/opt/macosx-sdk/usr/lib -F/opt/macosx-sdk/System/Library/Frameworks"
              echo "TARGET_CXX=zig c++ -w --target=x86_64-macos -I/opt/macosx-sdk/usr/include -L/opt/macosx-sdk/usr/lib -F/opt/macosx-sdk/System/Library/Frameworks"
              echo "TARGET_CGO_CFLAGS="
              echo "TARGET_CGO_LDFLAGS="
            } >> "$GITHUB_ENV"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull or build zigcc image
        run: |
          if ! docker pull "${{ env.ZIGCC_IMAGE }}" 2>/dev/null; then
            echo "Image not in registry, building locally..."
            docker build --build-arg UID=1001 --build-arg GID=1001 \
              -t "${{ env.ZIGCC_IMAGE }}" scripts/zigcc
          fi

      - name: Cross-platform lint (${{ matrix.target }})
        run: |
          docker run --rm \
            -v "${PWD}:/build" \
            -e GOOS=${{ matrix.target }} \
            -e GOARCH=amd64 \
            -e CGO_ENABLED=1 \
            -e CC="${TARGET_CC}" \
            -e CXX="${TARGET_CXX}" \
            -e CGO_CFLAGS="${TARGET_CGO_CFLAGS}" \
            -e CGO_LDFLAGS="${TARGET_CGO_LDFLAGS}" \
            ${{ env.ZIGCC_IMAGE }} \
            bash -c 'curl -sSfL https://golangci-lint.run/install.sh | sh -s -- -b /home/build/bin 2>&1 | tail -1 && PATH="/home/build/bin:$PATH" golangci-lint run --timeout=5m'

  native-pr-tests:
    name: Native PR Tests
    if: github.event_name == 'pull_request'
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 12
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos
            runner: macos-latest
          - os: windows
            runner: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Configure Go paths for Windows
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "D:\go-cache" | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\go-mod-cache" | Out-Null
          New-Item -ItemType Directory -Force -Path "D:\go-tmp" | Out-Null
          Add-Content -Path $env:GITHUB_ENV -Value "GOCACHE=D:\go-cache"
          Add-Content -Path $env:GITHUB_ENV -Value "GOMODCACHE=D:\go-mod-cache"
          Add-Content -Path $env:GITHUB_ENV -Value "GOTMPDIR=D:\go-tmp"

      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: pkgconf
          path-type: inherit

      - name: Restore Go cache (macOS)
        if: matrix.os == 'macos'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            ~/go/pkg/mod
            ~/.cache/go-build
          key: no-match-${{ runner.os }}-native-pr
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-
            ${{ runner.os }}-go-

      - name: Restore Go cache (Windows)
        if: matrix.os == 'windows'
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: |
            D:\go-mod-cache
            D:\go-cache
          key: no-match-${{ runner.os }}-native-pr
          restore-keys: |
            ${{ runner.os }}-go-${{ hashFiles('go.mod') }}-
            ${{ runner.os }}-go-

      - name: Download Go modules (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: go mod download

      - name: Download Go modules (non-Windows)
        if: matrix.os != 'windows'
        run: go mod download

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos'
        run: |
          brew install libusb pkg-config

      - name: Run native tests (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        env:
          GOMAXPROCS: 2
        run: |
          go test -v -race \
            ./pkg/api \
            ./pkg/helpers \
            ./pkg/helpers/command \
            ./pkg/readers/externaldrive \
            ./pkg/platforms/shared/steam \
            ./pkg/platforms/shared/steam/steamtracker \
            ./pkg/service/restart \
            ./pkg/ui/systray

      - name: Run native tests (macOS)
        if: matrix.os == 'macos'
        run: |
          go test -v -race \
            ./pkg/api \
            ./pkg/helpers \
            ./pkg/helpers/command \
            ./pkg/readers/externaldrive \
            ./pkg/platforms/shared/steam \
            ./pkg/platforms/shared/steam/steamtracker \
            ./pkg/service/restart \
            ./pkg/ui/systray

      - name: Upload rapid failure artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: rapid-failures-native-${{ matrix.os }}
          path: '**/testdata/rapid/**/*.fail'
          if-no-files-found: ignore

  ci-status:
    name: CI Status
    if: always() && !cancelled()
    needs: [ci, cross-lint, native-pr-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check CI results
        run: |
          if [ "${{ needs.ci.result }}" != "success" ]; then
            echo "CI failed: ci=${{ needs.ci.result }}"
            exit 1
          fi
          CROSS_RESULT="${{ needs.cross-lint.result }}"
          if [ "$CROSS_RESULT" != "success" ] && [ "$CROSS_RESULT" != "skipped" ]; then
            echo "CI failed: cross-lint=$CROSS_RESULT"
            exit 1
          fi
          NATIVE_RESULT="${{ needs.native-pr-tests.result }}"
          if [ "$NATIVE_RESULT" != "success" ] && [ "$NATIVE_RESULT" != "skipped" ]; then
            echo "CI failed: native-pr-tests=$NATIVE_RESULT"
            exit 1
          fi
          echo "CI passed"
