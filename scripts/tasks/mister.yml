version: "3"

vars:
  MISTER_UTILS_DIR: scripts/mister/utils
  MISTER_SRC_DIR: "{{.MISTER_UTILS_DIR}}/src"
  MISTER_BUILD_DIR: "{{.MISTER_UTILS_DIR}}/build"
  MISTER_OUTPUT_DIR: _build/mister_arm
  FFMPEG_VERSION: "7.1"
  DOCKER_IMAGE: misterkun/toolchain
  TOOLCHAIN_PREFIX: arm-none-linux-gnueabihf
  ARM_CFLAGS: "-mcpu=cortex-a9 -mfloat-abi=hard -mtune=cortex-a9 -mfpu=neon"

tasks:
  download-arcadedb:
    desc: Download ArcadeDatabase.csv for embedding
    cmds:
      - mkdir -p pkg/platforms/mister/arcadedb
      - >-
        curl -fsSL -o pkg/platforms/mister/arcadedb/ArcadeDatabase.csv
        "https://raw.githubusercontent.com/MiSTer-devel/ArcadeDatabase_MiSTer/main/ArcadeDatabase.csv"
    status:
      - test -f pkg/platforms/mister/arcadedb/ArcadeDatabase.csv

  build-arm:
    desc: Build MiSTer ARM binary
    deps: [download-arcadedb]
    cmds:
      - task: :zigcc:build-linux-arm
        vars:
          PLATFORM: mister
          APP_BIN: zaparoo.sh
          EXTRA_TAGS: embed_arcadedb

  deploy:
    cmds:
      - task: build-{{.CLI_ARGS}}
      - scp _build/mister_{{.CLI_ARGS}}/zaparoo.sh root@${MISTER_IP}:/media/fat/Scripts/zaparoo.sh
      - ssh root@${MISTER_IP} /media/fat/Scripts/zaparoo.sh -service restart

  bench-build:
    desc: Cross-compile benchmark test binaries for MiSTer ARM
    cmds:
      - task: :zigcc:setup
      - task: :docker:run
        vars:
          IMAGE_NAME: zaparoo/zigcc
          BUILD_OS: linux
          BUILD_ARCH: arm
          NO_STATIC: true
          CC: "zig cc -target arm-linux-gnueabihf"
          CXX: "zig c++ -target arm-linux-gnueabihf"
          EXTRA_LDFLAGS: "-linkmode external"
          EXTRA_TAGS: ""
          EXTRA_DOCKER_ARGS: >-
            -e CGO_ENABLED=1
            -e GOOS=linux
            -e GOARCH=arm
            -e GO111MODULE=on
            -e CGO_CFLAGS="-I/opt/libnfc/arm-linux-gnueabihf/include"
            -e CGO_LDFLAGS="-L/opt/libnfc/arm-linux-gnueabihf/lib -L/opt/deps/arm-linux-gnueabihf/lib /opt/libnfc/arm-linux-gnueabihf/lib/libnfc.a /opt/deps/arm-linux-gnueabihf/lib/libusb.a /opt/deps/arm-linux-gnueabihf/lib/libusb-1.0.a -ldl"
          EXEC: >-
            bash -c 'set -e && mkdir -p _build/bench_arm &&
            PKGS=$(find ./pkg -name "*_bench_test.go" -o -name "*_test.go" | xargs grep -l "func Benchmark" | xargs -I{} dirname {} | sort -u) &&
            for pkg in $PKGS; do
            name=$(basename $pkg) &&
            echo "Building $pkg -> ${name}.test" &&
            go test -c
            -tags "netgo,osusergo,sqlite_omit_load_extension"
            -ldflags "-linkmode external -s -w"
            -o "_build/bench_arm/${name}.test" "$pkg"
            ; done &&
            echo "Done: $(ls _build/bench_arm/*.test | wc -l) binaries"'

  bench-run:
    desc: Run benchmark binaries on MiSTer and save baseline
    vars:
      BENCH_COUNT: '{{default "3" .BENCH_COUNT}}'
      BENCH_TIMEOUT: '{{default "60m" .BENCH_TIMEOUT}}'
      SSH_OPTS: -o ServerAliveInterval=30 -o ServerAliveCountMax=120
    cmds:
      - ssh {{.SSH_OPTS}} root@${MISTER_IP} "mkdir -p /media/fat/zaparoo-bench"
      - scp _build/bench_arm/*.test root@${MISTER_IP}:/media/fat/zaparoo-bench/
      - |
        (for bin in _build/bench_arm/*.test; do
          name=$(basename $bin)
          echo "Running $name..." >&2
          ssh {{.SSH_OPTS}} root@${MISTER_IP} "/media/fat/zaparoo-bench/$name -test.run='^\$' -test.bench=. -test.benchmem -test.count={{.BENCH_COUNT}} -test.timeout={{.BENCH_TIMEOUT}}"
        done) | grep -E "^(Benchmark.* ns/op|goos:|goarch:|pkg:|cpu:)" | tee testdata/benchmarks/baseline-mister.txt
      - ssh {{.SSH_OPTS}} root@${MISTER_IP} "rm -rf /media/fat/zaparoo-bench"

  bench:
    desc: Build and run benchmarks on MiSTer
    cmds:
      - task: bench-build
      - task: bench-run

  build-ffmpeg-libs:
    desc: Build FFmpeg static libraries for MiSTer
    vars:
      FFMPEG_SRC: "{{.MISTER_SRC_DIR}}/ffmpeg"
      FFMPEG_BUILD: "{{.MISTER_BUILD_DIR}}/ffmpeg"
    cmds:
      - mkdir -p {{.MISTER_SRC_DIR}} {{.MISTER_BUILD_DIR}} {{.MISTER_OUTPUT_DIR}}
      - |
        if [ ! -d "{{.FFMPEG_SRC}}" ]; then
          git clone --depth 1 --branch n{{.FFMPEG_VERSION}} https://github.com/FFmpeg/FFmpeg.git {{.FFMPEG_SRC}}
        else
          echo "FFmpeg source already exists at {{.FFMPEG_SRC}}"
        fi
      - |
        docker run --rm \
          --platform linux/arm \
          -v "$(pwd):/mister" \
          -w /mister/{{.FFMPEG_SRC}} \
          {{.DOCKER_IMAGE}} \
          bash -c "
            ./configure \
              --enable-static \
              --disable-shared \
              --pkg-config-flags='--static' \
              --extra-ldexeflags='-static' \
              --extra-cflags='{{.ARM_CFLAGS}}' \
              --prefix=/mister/{{.FFMPEG_BUILD}} \
              --disable-programs \
              --enable-ffprobe \
              --enable-small \
              --disable-doc \
              --disable-htmlpages \
              --disable-manpages \
              --disable-podpages \
              --disable-txtpages \
              --disable-debug \
              --disable-avdevice \
              --disable-postproc \
              --disable-network \
              --disable-encoders \
              --disable-muxers \
              --enable-gpl && \
            make -j\$(nproc) && \
            make install
          "

  build-ffprobe:
    desc: Build ffprobe binary for MiSTer
    deps: [build-ffmpeg-libs]
    vars:
      FFMPEG_SRC: "{{.MISTER_SRC_DIR}}/ffmpeg"
    cmds:
      - |
        docker run --rm \
          --platform linux/arm \
          -v "$(pwd):/mister" \
          -w /mister \
          {{.DOCKER_IMAGE}} \
          bash -c "
            cp {{.FFMPEG_SRC}}/ffprobe /mister/{{.MISTER_OUTPUT_DIR}}/ffprobe && \
            strip /mister/{{.MISTER_OUTPUT_DIR}}/ffprobe
          "

  build-nextfvp:
    desc: Build nextfvp framebuffer video player for MiSTer
    deps: [build-ffmpeg-libs]
    vars:
      NEXTFVP_SRC: "{{.MISTER_SRC_DIR}}/nextfvp"
      FFMPEG_BUILD: "{{.MISTER_BUILD_DIR}}/ffmpeg"
    cmds:
      - mkdir -p {{.MISTER_SRC_DIR}} {{.MISTER_OUTPUT_DIR}}
      - |
        if [ ! -d "{{.NEXTFVP_SRC}}" ]; then
          git clone https://github.com/kyx0r/nextfvp.git {{.NEXTFVP_SRC}}
        else
          echo "nextfvp source already exists at {{.NEXTFVP_SRC}}"
        fi
      - |
        docker run --rm \
          --platform linux/arm \
          -v "$(pwd):/mister" \
          -w /mister/{{.NEXTFVP_SRC}} \
          {{.DOCKER_IMAGE}} \
          bash -c "
            echo 'deb http://archive.debian.org/debian stretch main' > /etc/apt/sources.list && \
            apt-get update && apt-get install -y libasound2-dev && \
            gcc fvp.c \
              -pedantic -Wall -Wextra -Wno-implicit-fallthrough \
              -Wno-missing-field-initializers -Wno-unused-parameter \
              -Wfatal-errors -std=c99 -D_POSIX_C_SOURCE=200809L \
              {{.ARM_CFLAGS}} \
              -I/mister/{{.FFMPEG_BUILD}}/include \
              -O2 \
              -L/mister/{{.FFMPEG_BUILD}}/lib \
              /mister/{{.FFMPEG_BUILD}}/lib/libavformat.a \
              /mister/{{.FFMPEG_BUILD}}/lib/libavcodec.a \
              /mister/{{.FFMPEG_BUILD}}/lib/libavutil.a \
              /mister/{{.FFMPEG_BUILD}}/lib/libswscale.a \
              /mister/{{.FFMPEG_BUILD}}/lib/libswresample.a \
              -lz -lm -lpthread -lasound \
              -o fvp && \
            cp fvp /mister/{{.MISTER_OUTPUT_DIR}}/fvp && \
            strip /mister/{{.MISTER_OUTPUT_DIR}}/fvp
          "
